<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Store</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      /* Basic Reset */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    line-height: 1.6;
}
header {
    background-color: #333;
    color: #fff;
    display: flex;
    justify-content: space-between;
    padding: 1rem 2rem;
    align-items: center;
}
header .logo {
    font-size: 1.5rem;
    font-weight: bold;
}
header nav ul {
    list-style: none;
    display: flex;
    margin: 0;
    padding: 0;
}
header nav ul li {
    margin: 0 1rem;
}
header nav ul li a {
    color: #fff;
    text-decoration: none;
}
#hero {
    background: url('hero-image.jpg') no-repeat center center/cover;
    color: #fff;
    text-align: center;
    padding: 5rem 2rem;
}
#hero button {
    padding: 0.7rem 1.5rem;
    font-size: 1rem;
    background-color: #f04e30;
    color: #fff;
    border: none;
    cursor: pointer;
    margin-top: 1rem;
}
#shop {
    padding: 2rem;
    text-align: center;
}
.product-grid {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
}
.product {
    border: 1px solid #ddd;
    padding: 1rem;
    width: 200px;
    text-align: center;
}
.product img {
    width: 100%;
    height: auto;
}
footer {
    background-color: #333;
    color: #fff;
    text-align: center;
    padding: 1rem;
}

    </style>
</head>
<body>
    <header>
        <div class="logo">Clothify</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero">
        <h1>Welcome to Clothify</h1>
        <p>Discover the latest trends in fashion!</p>
        <button>Shop Now</button>
    </section>

    <section id="shop">
        <h2>Our Collection</h2>
        <div class="product-grid">
            <div class="product">
                <img src="https://cdn.pixabay.com/photo/2019/03/12/13/26/jeans-4050815_640.jpg" alt="Shirt">
                <h3>Stylish Shirt</h3>
                <p>$25.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://cdn.pixabay.com/photo/2022/09/09/05/16/colorful-jeans-7442353_640.jpg" alt="Pants">
                <h3>Classic Pants</h3>
                <p>$40.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="https://cdn.pixabay.com/photo/2017/08/06/11/41/fashion-2591672_640.jpg" alt="Jacket">
                <h3>Cool Jacket</h3>
                <p>$65.99</p>
                <button>Add to Cart</button>
            </div>
        </div>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2024 Clothify. All rights reserved.</p>
    </footer>
</body>
</html>
